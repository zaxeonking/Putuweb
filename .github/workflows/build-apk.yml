name: Build APK

# Jalankan manual dari tab "Actions" di repo GitHub -> pilih workflow ini -> "Run workflow".
# Bisa juga otomatis kalau kamu push tag yang diawali "apk-" (misal: apk-v1).
on:
  workflow_dispatch:
  push:
    tags:
      - "apk-*"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # @capacitor/local-notifications WAJIB di-install di sini -- tanpa ini,
      # window.Capacitor.Plugins.LocalNotifications selalu undefined di APK hasil build,
      # jadi lib/notify.js jatuh ke fallback Notification API browser yang TIDAK pernah
      # beneran munculin dialog izin notifikasi di WebView Android. Plugin ini juga yang
      # otomatis nambahin permission POST_NOTIFICATIONS (Android 13+) ke AndroidManifest.xml
      # pas 'cap sync' -- tidak perlu dipatch manual.
      #
      # PENTING: @capacitor/local-notifications DIKUNCI ke ^6.x -- kalau dibiarkan tanpa versi,
      # npm narik rilis TERBARU plugin ini (v8.x), yang minta peer @capacitor/core >=8.0.0.
      # Itu bentrok sama @capacitor/core/cli/android yang di-pin ^6.1.0 di package.json (lihat
      # mergePackageJsonForBuild di file ini juga), bikin npm install gagal ERESOLVE. Kalau nanti
      # core/cli/android di-upgrade ke v7/v8, versi local-notifications ini WAJIB dinaikkan bareng-bareng.
      #
      # @capacitor/app JUGA WAJIB di-install -- tanpa ini, window.Capacitor.Plugins.App selalu
      # undefined di APK hasil build, jadi efek cek-update-otomatis di pages/index.js (yang
      # manggil AppPlugin.getInfo() buat baca versionName ASLI yang ke-bake di APK ini) selalu
      # gagal dan jatuh ke fallback APK_CURRENT_VERSION (angka statis di kode website, gampang
      # jadi USANG begitu ada rilis baru) -- ini yang bikin banner "Update tersedia" nongol
      # terus-terusan walau APK yang ke-install user sebenarnya udah versi paling baru.
      - name: Install Capacitor
        run: npm install @capacitor/core@^6.1.0 @capacitor/cli@^6.1.0 @capacitor/android@^6.1.0 @capacitor/local-notifications@^6.0.0 @capacitor/app@^6.0.0

      # webDir cuma butuh 1 halaman placeholder karena app ini nge-load URL live
      # (lihat "server.url" di capacitor.config.json), bukan file statis hasil build.
      - name: Siapkan folder web minimal
        run: |
          mkdir -p www
          echo "<!doctype html><html><body>Loading...</body></html>" > www/index.html

      - name: Tambah platform Android
        run: npx cap add android

      # Ganti ikon default Capacitor (logo biru bawaan) pakai ikon app kamu sendiri.
      # "assets/icon.png" SELALU sudah ada di repo di titik ini -- dicommit otomatis
      # oleh fitur "Build App" (lib/build-templates.js/scaffold.js): ikon yang kamu
      # upload sendiri lewat drag-drop/pilih file kalau ada, kalau kosong dipakai ikon
      # yang sudah ada di repo (biasanya dari public/manifest.json, yang sama dipakai
      # buat PWA/TWA), dan kalau repo juga belum punya ikon apa pun baru fallback ke
      # ikon default bawaan aplikasi ini. @capacitor/assets otomatis generate semua
      # ukuran mipmap (termasuk adaptive icon) dari 1 file sumber itu.
      - name: Install @capacitor/assets
        run: npm install -D @capacitor/assets
      - name: Generate ikon Android dari assets/icon.png
        run: npx capacitor-assets generate --android

      - name: Aktifkan native Share Target (Android "Share to...") [experimental]
        run: |
          cat > patch-share-target.js << 'PATCHEOF'
          const fs = require('fs');
          const p = 'android/app/src/main/AndroidManifest.xml';
          let xml = fs.readFileSync(p, 'utf8');
          if (!xml.includes('android.intent.action.SEND')) {
            const mimeTypes = ["*/*"];
            const mimeLines = mimeTypes.map(function (m) { return '        <data android:mimeType="' + m + '" />'; }).join('\n');
            const inject = '    <intent-filter>\n' +
              '        <action android:name="android.intent.action.SEND" />\n' +
              '        <category android:name="android.intent.category.DEFAULT" />\n' +
              mimeLines + '\n' +
              '    </intent-filter>\n';
            xml = xml.replace('</activity>', inject + '    </activity>');
            fs.writeFileSync(p, xml);
          }
          PATCHEOF
          node patch-share-target.js

      - name: Tulis MainActivity.java custom (fix tombol back + native share target handler) [experimental]
        run: |
          mkdir -p android/app/src/main/java/com/example/putuweb
          cat > android/app/src/main/java/com/example/putuweb/MainActivity.java << 'JAVAEOF'
          package com.example.putuweb;

          import android.content.Context;
          import android.content.Intent;
          import android.database.Cursor;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.OpenableColumns;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          import com.getcapacitor.BridgeWebViewClient;
          import org.json.JSONObject;

          import java.io.ByteArrayOutputStream;
          import java.io.InputStream;
          import java.io.OutputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;

          // Auto-generated oleh GitHub Uploader ("Build App" -> APK) -- EXPERIMENTAL, belum pernah
          // dicompile beneran lewat CI di sesi ini, tolong dites & lapor kalau ada yang gagal build.
          public class MainActivity extends BridgeActivity {

            private static final String SHARE_ENDPOINT = "https://putuweb.vercel.app/api/share-target";
            private static final String APP_ORIGIN = "https://putuweb.vercel.app";

            // Nama extra yang dipakai KeepAliveService buat ngirim tahu "proses mana yang lagi
            // jalan" waktu notifikasi diketuk (lihat handleNotificationTarget() di bawah), dan nama
            // fungsi JS (didaftarkan di lib/notify.js sisi web) yang bakal dipanggil buat ngarahin
            // app ke proses itu (misal buka modal Actions/build log yang relevan).
            public static final String EXTRA_NOTIFICATION_TARGET = "notification_target";

            // Jembatan JS -> Java: dipanggil dari web (window.AndroidNotifBridge.updateStatus(...),
            // lihat lib/notify.js) tiap kali ada progress baru (upload/build/deploy) SELAMA app
            // di-minimize, supaya notifikasi background nunjukin status ASLI, bukan cuma teks generik.
            private final class WebAppInterface {
              private final Context context;

              WebAppInterface(Context context) {
                this.context = context;
              }

              @JavascriptInterface
              public void updateStatus(String text, String target) {
                KeepAliveService.updateStatus(context, text, target);
              }
            }

            @Override
            protected void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              getBridge().getWebView().addJavascriptInterface(new WebAppInterface(this), "AndroidNotifBridge");
              handleShareIntent(getIntent());
              handleNotificationTarget(getIntent());
              setupHomeReturnHistoryClear();
            }

            // Login GitHub/Vercel itu full-page redirect chain (app -> github.com/vercel.com ->
            // balik lagi ke app), jadi tiap step-nya numpuk di history WebView. Begitu WebView
            // kedeteksi balik ke halaman utama app (URL == APP_ORIGIN + "/") SETELAH sempat
            // pergi ke luar, kita bersihin history-nya -- supaya abis connect GitHub/Vercel,
            // tombol back nggak perlu dipencet berkali-kali buat "ngelewatin" halaman-halaman
            // OAuth yang udah kelar dipakai & nggak berguna lagi buat di-back ke situ.
            private void setupHomeReturnHistoryClear() {
              final WebView webView = getBridge().getWebView();
              webView.setWebViewClient(new BridgeWebViewClient(getBridge()) {
                @Override
                public void onPageFinished(WebView view, String url) {
                  super.onPageFinished(view, url);
                  if (webView.canGoBack()
                      && (url.equals(APP_ORIGIN + "/") || url.equals(APP_ORIGIN))) {
                    webView.clearHistory();
                  }
                }
              });
            }

            @Override
            public void onNewIntent(Intent intent) {
              super.onNewIntent(intent);
              handleShareIntent(intent);
              handleNotificationTarget(intent);
            }

            @Override
            public void onBackPressed() {
              // Tanpa ini, tombol back FISIK Android langsung nutup app (finish activity) --
              // BridgeActivity bawaan TIDAK otomatis nyoba mundur ke halaman WebView sebelumnya.
              // Ini yang bikin bug "dari /privacy /terms /panduan pencet back malah keluar app".
              if (getBridge().getWebView().canGoBack()) {
                getBridge().getWebView().goBack();
              } else {
                super.onBackPressed();
              }
            }

            @Override
            public void onStop() {
              super.onStop();
              // App baru beneran "diminimize" (bukan cuma ketutup dialog sesaat) -- nyalain
              // foreground service supaya proses ini TIDAK dibekukan/dimatikan Android, biar
              // polling JS (cek status deploy) di WebView tetap lanjut jalan di background.
              Intent serviceIntent = new Intent(this, KeepAliveService.class);
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                startForegroundService(serviceIntent);
              } else {
                startService(serviceIntent);
              }
            }

            @Override
            public void onStart() {
              super.onStart();
              // App dibuka lagi -- foreground service (& notifikasi persistennya) gak dibutuhin
              // lagi selama app kelihatan di layar.
              stopService(new Intent(this, KeepAliveService.class));
            }

            // Notifikasi background diketuk sambil ada proses spesifik yang lagi jalan (target
            // dikirim KeepAliveService lewat EXTRA_NOTIFICATION_TARGET) -- panggil fungsi JS di
            // halaman web supaya app langsung diarahkan ke proses itu (misal buka modal build log),
            // bukan cuma balik nongol ke halaman utama begitu-begitu saja.
            private void handleNotificationTarget(final Intent intent) {
              if (intent == null) return;
              final String target = intent.getStringExtra(EXTRA_NOTIFICATION_TARGET);
              if (target == null || target.isEmpty()) return;
              intent.removeExtra(EXTRA_NOTIFICATION_TARGET);
              final WebView webView = getBridge().getWebView();
              webView.post(new Runnable() {
                @Override
                public void run() {
                  String js = "window.__ghUploaderNotificationTap && window.__ghUploaderNotificationTap("
                      + JSONObject.quote(target) + ");";
                  webView.evaluateJavascript(js, null);
                }
              });
            }

            private void handleShareIntent(final Intent intent) {
              if (intent == null) return;
              if (!Intent.ACTION_SEND.equals(intent.getAction())) return;

              new Thread(new Runnable() {
                @Override
                public void run() {
                  final String html = tryUploadShare(intent);
                  if (html == null) return;
                  runOnUiThread(new Runnable() {
                    @Override
                    public void run() {
                      getBridge().getWebView().loadDataWithBaseURL(
                          APP_ORIGIN + "/",
                          html,
                          "text/html",
                          "UTF-8",
                          APP_ORIGIN + "/?shared=1"
                      );
                    }
                  });
                }
              }).start();
            }

            private String tryUploadShare(Intent intent) {
              HttpURLConnection conn = null;
              try {
                Uri streamUri = intent.getParcelableExtra(Intent.EXTRA_STREAM);
                String text = intent.getStringExtra(Intent.EXTRA_TEXT);
                String title = intent.getStringExtra(Intent.EXTRA_SUBJECT);

                String boundary = "----GHUploaderBoundary" + System.currentTimeMillis();
                URL url = new URL(SHARE_ENDPOINT);
                conn = (HttpURLConnection) url.openConnection();
                conn.setDoOutput(true);
                conn.setRequestMethod("POST");
                conn.setRequestProperty("Content-Type", "multipart/form-data; boundary=" + boundary);

                OutputStream out = conn.getOutputStream();
                writeFormField(out, boundary, "title", title == null ? "" : title);
                writeFormField(out, boundary, "text", text == null ? "" : text);
                writeFormField(out, boundary, "url", "");

                if (streamUri != null) {
                  String fileName = queryFileName(streamUri);
                  String mimeType = getContentResolver().getType(streamUri);
                  if (mimeType == null) mimeType = "application/octet-stream";
                  InputStream in = getContentResolver().openInputStream(streamUri);
                  writeFormFile(out, boundary, "files", fileName, mimeType, in);
                  if (in != null) in.close();
                }

                out.write(("--" + boundary + "--\r\n").getBytes("UTF-8"));
                out.flush();
                out.close();

                int status = conn.getResponseCode();
                InputStream body = (status >= 200 && status < 300) ? conn.getInputStream() : conn.getErrorStream();
                return readAll(body);
              } catch (Exception e) {
                e.printStackTrace();
                return null;
              } finally {
                if (conn != null) conn.disconnect();
              }
            }

            private static void writeFormField(OutputStream out, String boundary, String name, String value) throws Exception {
              StringBuilder sb = new StringBuilder();
              sb.append("--").append(boundary).append("\r\n");
              sb.append("Content-Disposition: form-data; name=\"").append(name).append("\"\r\n\r\n");
              sb.append(value).append("\r\n");
              out.write(sb.toString().getBytes("UTF-8"));
            }

            private static void writeFormFile(OutputStream out, String boundary, String field, String fileName, String mimeType, InputStream in) throws Exception {
              StringBuilder sb = new StringBuilder();
              sb.append("--").append(boundary).append("\r\n");
              sb.append("Content-Disposition: form-data; name=\"").append(field).append("\"; filename=\"").append(fileName).append("\"\r\n");
              sb.append("Content-Type: ").append(mimeType).append("\r\n\r\n");
              out.write(sb.toString().getBytes("UTF-8"));
              if (in != null) {
                byte[] buf = new byte[8192];
                int len;
                while ((len = in.read(buf)) != -1) {
                  out.write(buf, 0, len);
                }
              }
              out.write("\r\n".getBytes("UTF-8"));
            }

            private String queryFileName(Uri uri) {
              String result = "shared-file";
              Cursor cursor = getContentResolver().query(uri, null, null, null, null);
              if (cursor != null) {
                try {
                  int idx = cursor.getColumnIndex(OpenableColumns.DISPLAY_NAME);
                  if (cursor.moveToFirst() && idx >= 0) {
                    String name = cursor.getString(idx);
                    if (name != null) result = name;
                  }
                } finally {
                  cursor.close();
                }
              }
              return result;
            }

            private static String readAll(InputStream in) throws Exception {
              if (in == null) return "";
              ByteArrayOutputStream out = new ByteArrayOutputStream();
              byte[] buf = new byte[8192];
              int len;
              while ((len = in.read(buf)) != -1) out.write(buf, 0, len);
              return out.toString("UTF-8");
            }
          }

          JAVAEOF

      - name: Tulis KeepAliveService.java (biar app gak dibekukan pas di-minimize)
        run: |
          mkdir -p android/app/src/main/java/com/example/putuweb
          cat > android/app/src/main/java/com/example/putuweb/KeepAliveService.java << 'JAVAEOF'
          package com.example.putuweb;

          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.ServiceInfo;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;

          // Auto-generated oleh GitHub Uploader ("Build App" -> APK).
          //
          // Selain menahan proses supaya tidak dibekukan Android (lihat catatan di atas file ini),
          // service ini sekarang juga menampilkan STATUS ASLI dari proses yang lagi jalan (upload,
          // build APK, deploy, dsb -- lihat updateStatus() yang dipanggil dari WebAppInterface di
          // MainActivity, yang dipanggil dari JS lewat window.AndroidNotifBridge), dan notifikasinya
          // bisa DIKETUK untuk balik ke app -- kalau ada proses spesifik yang lagi jalan (target
          // dikirim dari JS), app dibuka lalu diarahkan ke situ lewat event "__ghUploaderNotificationTap"
          // (lihat handleNotificationTarget() di MainActivity).
          public class KeepAliveService extends Service {

            private static final String CHANNEL_ID = "keep_alive_channel";
            private static final int NOTIF_ID = 42;
            private static final String DEFAULT_TEXT = "Tetap berjalan di background...";

            public static final String EXTRA_TEXT = "status_text";
            public static final String EXTRA_TARGET = "status_target";

            // Nandain service ini beneran lagi aktif (foreground) atau tidak, supaya updateStatus()
            // di bawah tidak nyoba startService() waktu app lagi di foreground (service belum/tidak
            // jalan) -- Android 8+ melarang start service dari background context kalau bukan buat
            // mempromosikan ke foreground service yang SUDAH berjalan.
            private static volatile boolean sRunning = false;

            // Dipanggil dari WebAppInterface.updateStatus() (JS -> Java, lihat MainActivity) tiap kali
            // ada progress baru (persentase upload, tahap build/deploy, dst) SELAMA app di-minimize,
            // supaya notifikasi yang kelihatan di HP bukan cuma teks generik "Tetap berjalan di
            // background..." tapi status asli dari proses yang sedang jalan.
            public static void updateStatus(Context context, String text, String target) {
              if (!sRunning) return;
              Intent intent = new Intent(context, KeepAliveService.class);
              intent.putExtra(EXTRA_TEXT, text);
              intent.putExtra(EXTRA_TARGET, target);
              context.startService(intent);
            }

            @Override
            public void onCreate() {
              super.onCreate();
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                NotificationManager manager = getSystemService(NotificationManager.class);
                if (manager != null && manager.getNotificationChannel(CHANNEL_ID) == null) {
                  NotificationChannel channel = new NotificationChannel(
                      CHANNEL_ID, "Aktivitas Latar Belakang", NotificationManager.IMPORTANCE_MIN);
                  channel.setShowBadge(false);
                  manager.createNotificationChannel(channel);
                }
              }
            }

            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
              sRunning = true;

              String text = (intent != null && intent.hasExtra(EXTRA_TEXT) && intent.getStringExtra(EXTRA_TEXT) != null)
                  ? intent.getStringExtra(EXTRA_TEXT)
                  : DEFAULT_TEXT;
              String target = intent != null ? intent.getStringExtra(EXTRA_TARGET) : null;

              // Ketuk notifikasi -> balik ke app. Kalau ada proses spesifik yang lagi jalan (target
              // tidak kosong), extra ini diteruskan ke MainActivity supaya app langsung diarahkan
              // ke proses itu (bukan cuma balik ke halaman utama begitu-begitu saja).
              Intent tapIntent = new Intent(this, MainActivity.class);
              tapIntent.setFlags(Intent.FLAG_ACTIVITY_CLEAR_TOP | Intent.FLAG_ACTIVITY_SINGLE_TOP | Intent.FLAG_ACTIVITY_NEW_TASK);
              if (target != null && !target.isEmpty()) {
                tapIntent.putExtra(MainActivity.EXTRA_NOTIFICATION_TARGET, target);
              }
              int piFlags = PendingIntent.FLAG_UPDATE_CURRENT
                  | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0);
              PendingIntent contentIntent = PendingIntent.getActivity(this, 0, tapIntent, piFlags);

              NotificationCompat.Builder builder = new NotificationCompat.Builder(this, CHANNEL_ID)
                  .setContentTitle("Putuweb")
                  .setContentText(text)
                  .setSmallIcon(R.drawable.ic_stat_sync)
                  .setContentIntent(contentIntent)
                  .setOnlyAlertOnce(true)
                  .setOngoing(true)
                  .setPriority(NotificationCompat.PRIORITY_MIN);

              if (Build.VERSION.SDK_INT >= 34) {
                startForeground(NOTIF_ID, builder.build(), ServiceInfo.FOREGROUND_SERVICE_TYPE_DATA_SYNC);
              } else {
                startForeground(NOTIF_ID, builder.build());
              }
              return START_STICKY;
            }

            @Override
            public void onDestroy() {
              super.onDestroy();
              sRunning = false;
            }

            @Override
            public IBinder onBind(Intent intent) {
              return null;
            }
          }

          JAVAEOF

      - name: Tulis ikon notifikasi custom (ganti ikon panah-download bawaan Android)
        run: |
          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/ic_stat_sync.xml << 'ICONEOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24"
              android:tint="#FFFFFF">
            <path
                android:fillColor="#FF000000"
                android:pathData="M12,4V1L8,5l4,4V6c3.31,0 6,2.69 6,6c0 1.01,-0.25 1.97,-0.7 2.8l1.46,1.46C19.54,15.03 20,13.57 20,12 20,7.58 16.42,4 12,4zM12,18c-3.31,0 -6,-2.69 -6,-6 0,-1.01 0.25,-1.97 0.7,-2.8L5.24,7.74C4.46,8.97 4,10.43 4,12c0,4.42 3.58,8 8,8v3l4,-4 -4,-4v3z" />
          </vector>

          ICONEOF

      - name: Tambah permission + deklarasi KeepAliveService ke AndroidManifest.xml
        run: |
          cat > patch-keepalive.js << 'PATCHEOF'
          const fs = require('fs');
          const p = 'android/app/src/main/AndroidManifest.xml';
          let xml = fs.readFileSync(p, 'utf8');
          if (!xml.includes('FOREGROUND_SERVICE_DATA_SYNC')) {
            xml = xml.replace('<application',
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n' +
              '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />\n' +
              '    <application');
          }
          if (!xml.includes('KeepAliveService')) {
            xml = xml.replace('</application>',
              '        <service android:name=".KeepAliveService" android:foregroundServiceType="dataSync" android:exported="false" />\n    </application>');
          }
          fs.writeFileSync(p, xml);
          PATCHEOF
          node patch-keepalive.js


      - name: Sinkronkan config ke project Android
        run: npx cap sync android

      # WAJIB dijalankan SETELAH cap sync -- 'cap add android' / 'cap sync' selalu nulis
      # ulang versionName="1.0" versionCode=1 default, jadi patch ini yang terakhir
      # nentuin angka final yang benar-benar ke-bake di APK.
      - name: Set versionName/versionCode APK dari package.json
        run: |
          cat > patch-version-gradle.js << 'PATCHEOF'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const versionName = (pkg.version || '1.0.0').trim();
          const parts = versionName.split('.').map((n) => parseInt(n, 10) || 0);
          const versionCode = (parts[0] || 0) * 10000 + (parts[1] || 0) * 100 + (parts[2] || 0);
          const p = 'android/app/build.gradle';
          let gradle = fs.readFileSync(p, 'utf8');
          gradle = gradle.replace(/versionName "[^"]*"/, `versionName "${versionName}"`);
          gradle = gradle.replace(/versionCode \d+/, `versionCode ${versionCode}`);
          fs.writeFileSync(p, gradle);
          console.log(`Set versionName=${versionName} versionCode=${versionCode}`);
          PATCHEOF
          node patch-version-gradle.js

      # Tiap runner GitHub Actions itu mesin BARU, jadi kalau dibiarkan default, Gradle
      # bakal generate debug.keystore ACAK setiap kali workflow ini jalan -- artinya tiap
      # APK hasil build punya tanda tangan (signing certificate) yang BEDA-BEDA. Android
      # menolak nge-install APK "menimpa" (update) yang lama kalau tanda tangannya beda,
      # jadi user KEPAKSA uninstall dulu APK versi sebelumnya tiap mau update. Fix: simpan
      # SATU keystore debug yang sama (di-commit base64 ke repo ini sendiri -- aman, bukan
      # secret produksi, cuma dipakai buat sideload/testing) dan dipakai ULANG di lokasi
      # default yang dicari Android Gradle Plugin (~/.android/debug.keystore, alias
      # androiddebugkey, password "android"), supaya semua APK dari repo ini SELALU
      # bertanda tangan sama -> bisa update in-place tanpa uninstall.
      - name: Siapkan keystore debug persisten (biar update APK gak perlu uninstall dulu)
        run: |
          mkdir -p ~/.android
          if [ -f ".github/keystore/debug.keystore.b64" ]; then
            echo "Keystore persisten sudah ada di repo, pakai yang ini (biar tanda tangan sama kayak build sebelumnya)."
            base64 -d ".github/keystore/debug.keystore.b64" > ~/.android/debug.keystore
          else
            echo "Belum ada keystore persisten -- generate sekali ini aja, lalu disimpan ke repo buat dipakai ulang di build-build berikutnya."
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            mkdir -p .github/keystore
            base64 -w0 ~/.android/debug.keystore > .github/keystore/debug.keystore.b64
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/keystore/debug.keystore.b64
            git diff --cached --quiet || git commit -m "chore: simpan keystore debug persisten (biar update APK gak perlu uninstall)"
            git push
          fi

      - name: Build APK (debug, tanpa perlu signing key)
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      # "debug" di sini cuma istilah internal Android buat build type (soal ini nggak
      # butuh signing key sendiri) -- app-nya install & jalan normal kayak app biasa,
      # cuma nama file mentahnya generik "app-debug.apk" makanya di-rename di sini
      # biar sesuai nama app yang kamu isi.
      - name: Rename APK sesuai nama app
        working-directory: android
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Putuweb.apk

      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: Putuweb
          path: android/app/build/outputs/apk/debug/Putuweb.apk
